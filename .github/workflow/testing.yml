name: Run Tests

on: push

jobs:
  run_tests:
    runs-on: ubuntu-latest

    steps:
    - name: Get the code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run unit tests
      run: python -m unittest test_app.py