{% extends "layout.html" %}

{% block body %}

<h1>Flights</h1>

<ul>
    {% for flight in flights %}
        <li>
            <a href="{{ url_for('flight_detail', flight_id=flight.id) }}">
                {{ flight.origin }} to {{ flight.destination }}
            </a>
            <br>
            Departure: {{ flight.departure_time }}
            <br>
            Arrival: {{ flight.arrival_time }}
        </li>
    {% endfor %}
</ul>

{% endblock %}
